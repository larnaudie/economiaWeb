<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurar Perfil - Economía Web</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Configurar Perfil</h1>
            <div>
                <a href="index.html">Volver</a>
                <button id="logoutButton" style="margin-left: 1rem;">Cerrar sesión</button>
            </div>
        </div>
    </header>

    <main>
        <section>
            <h2>Editar mi perfil</h2>
            <form id="perfilForm">
                <label for="username">Nombre de usuario:</label>
                <input type="text" id="username" required minlength="3" maxlength="30">

                <label for="email">Email:</label>
                <input type="email" id="email">

                <label for="password">Nueva contraseña:</label>
                <input type="password" id="password" minlength="6">

                <label for="confirmPassword">Repetir contraseña:</label>
                <input type="password" id="confirmPassword" minlength="6">

                <button type="submit">Guardar cambios</button>
            </form>

            <div id="perfilError" class="error"></div>
            <div id="perfilSuccess" style="color: green; margin-top: 0.75rem;"></div>
        </section>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/perfil.js"></script>
</body>
</html>
