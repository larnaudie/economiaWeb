<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - Economía Web</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header></header>

    <main>
        <section>
            <button type="button" id="openCuentaModal">Crear Cuenta</button>
        </section>
        <section>
            <h2>Mis Cuentas</h2>

            <div class="inline-group" style="margin-bottom: 1rem;">
                <div>
                    <label for="bulkCuentaBanco">Cambiar banco:</label>
                    <select id="bulkCuentaBanco">
                        <option value="">No cambiar</option>
                    </select>
                </div>

                <div>
                    <button type="button" id="aplicarBulkCuentasBtn">Aplicar a Seleccionadas</button>
                </div>

                <div>
                    <button type="button" id="eliminarCuentasSeleccionadasBtn">Eliminar Seleccionadas</button>
                </div>
            </div>

            <div id="bulkCuentasError" class="error"></div>
            <div id="bulkCuentasSuccess" style="color: green; margin-top: 0.75rem;"></div>

            <table>
                <thead>
                    <tr>
                        <th><input type="checkbox" id="selectAllCuentas"></th>
                        <th>Nombre</th>
                        <th>Banco</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="cuentasList">
                    <tr>
                        <td colspan="4">No hay elementos registrados.</td>
                    </tr>
                </tbody>
            </table>
        </section>

        <div id="gestionError" class="error"></div>

        <div id="cuentaModal" class="modal hidden">
            <div class="modal-content">
                <button type="button" class="close-modal" data-close="cuentaModal">&times;</button>
                <h2>Nueva Cuenta</h2>

                <form id="modalCuentaForm">
                    <label for="modalCuentaNombre">Nombre</label>
                    <input type="text" id="modalCuentaNombre" required placeholder="Ej: Caja Ahorro USD">

                    <label for="modalCuentaBanco">Banco</label>
                    <select id="modalCuentaBanco" required>
                        <option value="">Seleccionar banco</option>
                    </select>

                    <div id="modalCuentaError" class="error"></div>

                    <div class="modal-actions">
                        <button type="submit">Guardar cuenta</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/header.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/crear-cuenta.js"></script>
</body>

</html>
