<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Economía Web</title>

    <style>
      body {
        display: none;
      }
    </style>

    <script>
      if (!localStorage.getItem("token")) {
        window.location.replace("/login.html");
      } else {
        document.addEventListener("DOMContentLoaded", () => {
          document.body.style.display = "block";
        });
      }
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <header></header>

    <main>
      <section id="explorarBanco">
        <h2>Explorar por Banco</h2>

        <div class="inline-group">
          <div>
            <label for="bancoSeleccionado">Seleccionar Banco:</label>
            <select id="bancoSeleccionado">
              <option value="">Seleccionar banco</option>
            </select>
          </div>
        </div>

        <div id="cuentasContainer" class="cuentas-carousel">
          <p>Seleccioná un banco para ver sus cuentas.</p>
        </div>
      </section>

      <section>
        <details open>
          <summary>
            <h2>Acciones rápidas</h2>
          </summary>

          <div class="inline-group">
            <button type="button" id="openBancoModal">Crear Banco</button>
            <button type="button" id="openCuentaModal">Crear Cuenta</button>
            <button type="button" id="openCategoriaModal">
              Crear Subcategoría
            </button>
            <button type="button" id="openGastoModal">Crear Gasto</button>
          </div>
        </details>
      </section>

      <section>
        <h2>Filtros</h2>

        <div class="inline-group">
          <div>
            <label for="modoFiltroDashboard">Tipo de filtro:</label>
            <select id="modoFiltroDashboard">
              <option value="todos">Todos</option>
              <option value="mes">Mes</option>
              <option value="rango">Rango</option>
            </select>
          </div>

          <div id="grupoMesDashboard" style="display: none">
            <label for="mesDashboard">Mes:</label>
            <select id="mesDashboard">
              <option value="1">Enero</option>
              <option value="2">Febrero</option>
              <option value="3">Marzo</option>
              <option value="4">Abril</option>
              <option value="5">Mayo</option>
              <option value="6">Junio</option>
              <option value="7">Julio</option>
              <option value="8">Agosto</option>
              <option value="9">Septiembre</option>
              <option value="10">Octubre</option>
              <option value="11">Noviembre</option>
              <option value="12">Diciembre</option>
            </select>
          </div>

          <div id="grupoAnioDashboard" style="display: none">
            <label for="anioDashboard">Año:</label>
            <input type="number" id="anioDashboard" placeholder="2026" />
          </div>

          <div id="grupoDesdeDashboard" style="display: none">
            <label for="filtroDesde">Desde:</label>
            <input type="date" id="filtroDesde" />
          </div>

          <div id="grupoHastaDashboard" style="display: none">
            <label for="filtroHasta">Hasta:</label>
            <input type="date" id="filtroHasta" />
          </div>

          <button type="button" id="aplicarFiltroDashboard">Aplicar</button>
        </div>
      </section>
      <section>
        <h2>Dashboard financiero</h2>

        <div>
          <label for="cuentaDashboard">Seleccionar Cuenta:</label>
          <select id="cuentaDashboard">
            <option value="">Todas las cuentas del banco</option>
          </select>
        </div>

        <div class="dashboard-grid">
          <div class="chart-card">
            <div class="chart-card-header">
              <h3>Gasto real</h3>

              <div>
                <label for="tipoAgrupacionCategoria">Agrupar por:</label>
                <select id="tipoAgrupacionCategoria">
                  <option value="subcategoria">Subcategoría</option>
                  <option value="categoriaPrincipal">
                    Categoría principal
                  </option>
                </select>
              </div>
            </div>

            <canvas id="gastoRealCategoriaChart"></canvas>
            <div id="gastoRealCategoriaLegend" class="chart-legend"></div>
          </div>

          <div class="chart-card">
            <h3>Gasto bancario</h3>
            <canvas id="gastoBancarioCategoriaChart"></canvas>
            <div id="gastoBancarioCategoriaLegend" class="chart-legend"></div>
          </div>

          <div class="chart-card">
            <h3>Gasto bancario vs gasto real</h3>
            <canvas id="bancarioVsRealChart"></canvas>
          </div>

          <div class="chart-card">
            <h3>Gasto bancario vs gasto real mes a mes</h3>
            <canvas id="evolucionMensualChart"></canvas>
          </div>

          <div class="chart-card">
            <h3>Saldo restante de deudas</h3>
            <canvas id="deudasSaldoChart"></canvas>
          </div>
        </div>
      </section>

      <div id="bancoModal" class="modal hidden">
        <div class="modal-content">
          <button type="button" class="close-modal" data-close="bancoModal">
            &times;
          </button>
          <h2>Nuevo Banco</h2>

          <form id="modalBancoForm">
            <label for="modalBancoNombre">Nombre</label>
            <input
              type="text"
              id="modalBancoNombre"
              required
              placeholder="Ej: Santander"
            />

            <div id="modalBancoError" class="error"></div>

            <div class="modal-actions">
              <button type="submit">Guardar banco</button>
            </div>
          </form>
        </div>
      </div>

      <div id="cuentaModal" class="modal hidden">
        <div class="modal-content">
          <button type="button" class="close-modal" data-close="cuentaModal">
            &times;
          </button>
          <h2>Nueva Cuenta</h2>

          <form id="modalCuentaForm">
            <label for="modalCuentaNombre">Nombre</label>
            <input
              type="text"
              id="modalCuentaNombre"
              required
              placeholder="Ej: Caja Ahorro USD"
            />

            <label for="modalCuentaBanco">Banco</label>
            <select id="modalCuentaBanco" required>
              <option value="">Seleccionar banco</option>
            </select>

            <div id="modalCuentaError" class="error"></div>

            <div class="modal-actions">
              <button type="submit">Guardar cuenta</button>
            </div>
          </form>
        </div>
      </div>

      <div id="categoriaModal" class="modal hidden">
        <div class="modal-content">
          <button class="close-modal" data-close="categoriaModal">
            &times;
          </button>
          <h2>Nueva Subcategoría</h2>

          <form id="modalCategoriaForm">
            <label for="modalCategoriaNombre">Nombre</label>
            <input
              type="text"
              id="modalCategoriaNombre"
              required
              minlength="2"
              placeholder="Ej: Supermercado"
            />

            <label for="modalCategoriaGrupo">Categoría principal</label>
            <select id="modalCategoriaGrupo">
              <option value="">Sin categoría principal</option>
            </select>

            <div id="modalCategoriaError" class="error"></div>

            <div class="modal-actions">
              <button type="submit">Guardar Subcategoría</button>
            </div>
          </form>
        </div>
      </div>

      <div id="gastoModal" class="modal hidden">
        <div class="modal-content">
          <button class="close-modal" data-close="gastoModal">&times;</button>
          <h2>Nuevo Gasto</h2>

          <form id="modalGastoForm">
            <label for="modalGastoFecha">Fecha</label>
            <input type="date" id="modalGastoFecha" required />

            <label for="modalGastoDescripcion">Descripción</label>
            <textarea
              id="modalGastoDescripcion"
              maxlength="500"
              required
            ></textarea>

            <label for="modalGastoFlujo">Gasto Bancario</label>
            <input type="number" id="modalGastoFlujo" step="0.01" required />

            <label for="modalGastoPorcentaje">Porcentaje Gasto Real</label>
            <input
              type="number"
              id="modalGastoPorcentaje"
              min="0"
              max="100"
              step="0.01"
              value="100"
              required
            />

            <label for="modalGastoEconomia">Gasto Real</label>
            <input type="number" id="modalGastoEconomia" step="0.01" readonly />

            <label>
              <input type="checkbox" id="modalGastoIncluirBancario" checked />
              Incluir en Gasto Bancario
            </label>

            <label>
              <input type="checkbox" id="modalGastoIncluirReal" checked />
              Incluir en Gasto Real
            </label>

            <label for="modalGastoCategoria">Subcategoría</label>
            <select id="modalGastoCategoria" required>
              <option value="">Seleccionar Subcategoría</option>
            </select>

            <label for="modalGastoCuenta">Cuenta</label>
            <select id="modalGastoCuenta" required>
              <option value="">Seleccionar cuenta</option>
            </select>

            <div id="modalGastoError" class="error"></div>

            <div class="modal-actions">
              <button type="submit">Guardar gasto</button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <script src="/js/security.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/header.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/js/quick-actions.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/dashboard.js"></script>
  </body>
</html>
